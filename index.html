<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snail Haven</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Jua", sans-serif;
      background: #71a0fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 40px;
      position: relative;
    }



    /* Main card */
    .main-box {
      width: 100%;
      max-width: 850px;
      background: white;
      border-radius: 35px;
      padding: 50px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: 4rem;
      color: #4d79d8;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #7a7a7a;
      margin-bottom: 45px;
      font-size: 1.1rem;
    }

    .info-box {
      background: #f4f7ff;
      border-radius: 25px;
      padding: 30px;
      color: #4f4f4f;
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 35px;
    }

    .info-box strong {
      color: #4d79d8;
    }

    .contact-title {
      font-size: 2rem;
      color: #4d79d8;
      margin-bottom: 25px;
      text-align: center;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .contact-button {
      text-decoration: none;
      background: #71a0fa;
      color: white;
      padding: 18px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1.1rem;
      transition: 0.2s;
    }

    .contact-button:hover {
      transform: translateY(-5px) scale(1.03);
      background: #5c8ef0;
    }

    .contact-button i {
      font-size: 1.3rem;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #9c9c9c;
    }
  </style>
</head>

<body>

  <!-- Main content -->
  <div class="main-box">
    <h1 class="title">Snail Haven</h1>

    <div class="info-box">
      <strong>Heya!</strong> Snail Haven is a game being developed by <strong>FrenchFried</strong> (Me).
      <br><br>
      As of right now, the game is still heavily WIP, but feel free to join the Discord server or reach out to me by email!
    </div>

    <h2 class="contact-title">Contact Me</h2>

    <div class="button-grid">
      <a class="contact-button" href="https://x.com/FrenchFried_ckd" target="_blank">
        <i class="fa-brands fa-x-twitter"></i> X / Twitter
      </a>

      <a class="contact-button" href="https://github.com/ffried122" target="_blank">
        <i class="fa-brands fa-github"></i> GitHub
      </a>

      <a class="contact-button" href="https://discord.gg/c8FbfNJm" target="_blank">
        <i class="fa-brands fa-discord"></i> Discord
      </a>

      <a class="contact-button" href="mailto:frenchfried122@gmail.com">
        <i class="fa-solid fa-envelope"></i> Email
      </a>
    </div>

    <div class="footer">
      Snail Haven © 2026 FrenchFried
    </div>
  </div>
</body>
</html>
